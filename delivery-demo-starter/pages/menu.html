<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味菜單 - CampusBite</title>
    <!-- 引入我們的莫蘭迪風格 CSS (路徑指向上一層) -->
    <link rel="stylesheet" href="../css/base.css">
    <style>
        /* 菜單頁面專屬排版 */
        .category-container {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .category-tags {
            display: inline-flex;
            gap: 15px;
            background-color: #EAE6DF;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid var(--morandi-border);
        }
        
        .category-tags .tag {
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--morandi-text-dark);
            transition: all 0.25s ease;
            user-select: none;
        }
        
        .category-tags .tag:hover {
            color: var(--morandi-green);
        }
        
        .category-tags .tag.active {
            background-color: var(--morandi-green);
            color: white;
            box-shadow: 0 4px 12px rgba(138, 154, 134, 0.2);
        }
        
        /* 購物車浮動提醒 */
        .go-to-cart-banner {
            background-color: var(--morandi-oat);
            color: white;
            border-radius: var(--radius);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 50px;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <!-- 導覽列 (Navbar) -->
    <nav class="navbar">
        <a href="../index.html" class="nav-logo">CampusBite</a>
        <ul class="nav-links">
            <li><a href="../index.html">首頁</a></li>
            <li><a href="restaurants.html">找餐廳</a></li>
            <li><a href="menu.html" class="active">美味菜單</a></li>
            <li>
                <a href="cart.html" style="position: relative;">
                    購物車
                    <span id="cart-badge" style="
                        position: absolute;
                        top: -8px;
                        right: -15px;
                        background-color: var(--morandi-rose);
                        color: white;
                        font-size: 0.75rem;
                        padding: 2px 6px;
                        border-radius: 50%;
                        display: none;
                    ">0</span>
                </a>
            </li>
            <li><a href="order-status.html">訂單狀態</a></li>
            <li><a href="contact.html">聯絡我們</a></li>
            <li><a href="profile.html">會員中心</a></li>
        </ul>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.2rem; color: var(--morandi-text-dark); margin-bottom: 10px;">美味菜單</h1>
            <p style="color: var(--morandi-text-light);">精選新鮮食材，為您量身打造的校園健康與美味指南</p>
        </header>

        <!-- 分類切換按鈕組 -->
        <div class="category-container">
            <div class="category-tags">
                <div class="tag active" data-category="healthy">🥗 蔬食健康輕食</div>
                <div class="tag" data-category="snacks">🍟 校園銅板炸物</div>
                <div class="tag" data-category="desserts">🍰 午茶甜點特區</div>
            </div>
        </div>

        <!-- 菜單商品網格 (將透過 JS 自動渲染) -->
        <div id="menu-grid" class="grid">
            <!-- JS 會自動在這裡產生菜單卡片 -->
        </div>

        <!-- 快速結帳橫幅 -->
        <div class="go-to-cart-banner">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 1.5rem;">🛒</span>
                <div>
                    <strong style="font-size: 1.05rem; display: block;">挑選得差不多了嗎？</strong>
                    <span style="font-size: 0.85rem; opacity: 0.9;">趕快進入購物車，套用逢甲專屬折扣碼！</span>
                </div>
            </div>
            <a href="cart.html" class="btn" style="background-color: white; color: var(--morandi-text-dark);">前往購物車</a>
        </div>
    </div>

    <!-- 頁尾 (Footer) -->
    <footer style="
        background-color: var(--morandi-card);
        border-top: 1px solid var(--morandi-border);
        text-align: center;
        padding: 30px 20px;
        margin-top: 80px;
        color: var(--morandi-text-light);
        font-size: 0.9rem;
    ">
        <p>© 2026 CampusBite 團隊開發版. All rights reserved.</p>
        <p style="font-size: 0.8rem; margin-top: 5px; color: #B5A69B;">逢甲大學資訊專題小組 製作 ✕ 獨立開發完成</p>
    </footer>

    <!-- 引入我們的 JS 大腦 (路徑指向上一層) -->
    <script src="../js/app.js"></script>
</body>
</html>
